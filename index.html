<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像合成ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="selector-panel">
            <h2>キャラクター選択</h2>
            <div id="thumbnail-list"></div>
        </div>

        <div id="preview-panel">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
            
            <div class="controls">
                <h3>テキスト入力</h3>
                <textarea id="text-input" rows="3" placeholder="2026.01.XX&#10;12ヶ月連続&#10;12回目"></textarea>
                <button id="downloadBtn">PNGとして保存</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
