<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRIAM Header Maker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="app">

    <!-- ==========================
         操作パネル
    =========================== -->

    <aside class="panel">

        <h1>IRIAM Header Maker</h1>

        <section>

            <h2>キャラクター</h2>

            <div id="characterList" class="character-list">

                <!-- JavaScriptで自動生成 -->

            </div>

        </section>

        <section>

            <h2>日付</h2>

            <input
                type="month"
                id="dateInput">

        </section>

        <section>

            <label>

                <input
                    type="checkbox"
                    id="firstCheck">

                初めて

            </label>

        </section>

        <section>

            <label>

                <input
                    type="checkbox"
                    id="continuousCheck">

                連続

            </label>

            <input
                type="number"
                id="continuousValue"
                value="12"
                min="1">

        </section>

        <section>

            <label>

                <input
                    type="checkbox"
                    id="countCheck">

                回数

            </label>

            <input
                type="number"
                id="countValue"
                value="12"
                min="1">

        </section>

        <button id="downloadBtn">

            PNG保存

        </button>

    </aside>

    <!-- ==========================
         プレビュー
    =========================== -->

    <main class="preview-area">

        <div class="preview-scale">

            <div id="preview">

                <img

                    id="backgroundImage"

                    class="layer"

                    src="assets/background/background_1.png"

                    alt="background">

                <img

                    id="characterImage"

                    class="layer"

                    src="assets/character/normal_sd_1.png"

                    alt="character">

                <img

                    id="overlayImage"

                    class="layer"

                    src="assets/overlay/overlay_1.png"

                    alt="overlay">

                <div
                    id="dateText"
                    class="date-text">

                    2026.06

                </div>

                <div
                    id="badgeText"
                    class="badge-text">

                    いつもありがとう！<br>
                    これからもよろしくね！

                </div>

            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
