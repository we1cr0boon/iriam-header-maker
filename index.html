<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>IRIAM Header Maker</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- 左メニュー -->
    <!-- ========================= -->

    <aside class="sidebar">

        <h1>IRIAM Header Maker</h1>

        <section>

            <h2>キャラクター</h2>

            <div
                id="characterList"
                class="character-list">
            </div>

        </section>

        <section>

            <h2>日付</h2>

            <input
                type="month"
                id="dateInput">

        </section>

        <section>

            <label>

                <input
                    type="checkbox"
                    id="firstCheck">

                初めて

            </label>

            <label>

                <input
                    type="checkbox"
                    id="continueCheck">

                連続

            </label>

            <input
                type="number"
                id="continueCount"
                value="1"
                min="1">

            <label>

                <input
                    type="checkbox"
                    id="timesCheck">

                回目

            </label>

            <input
                type="number"
                id="timesCount"
                value="1"
                min="1">

        </section>

        <button id="saveButton">

            PNG保存

        </button>

    </aside>

    <!-- ========================= -->
    <!-- プレビュー -->
    <!-- ========================= -->

    <main class="preview-area">

        <div id="preview">

            <img
                id="backgroundImage"
                class="background"
                src="assets/background/background_1.png">

            <img
                id="characterImage"
                class="character"
                src="assets/character/normal_sd_1.png">

            <img
                id="overlayImage"
                class="overlay"
                src="assets/overlay/overlay_1.png">

            <div
                id="dateText"
                class="date-text">

                2026.06

            </div>

            <div
                id="badgeText"
                class="badge-text">

                いつもありがとう！
                <br>
                これからもよろしくね！

            </div>

        </div>

    </main>

</div>

<script src="script.js?v=2"></script>
</body>

</html>
