<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRIAM Header Maker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

    <!--==========================
        左側メニュー
    ==========================-->

    <aside class="sidebar">

        <h1>IRIAM<br>Header Maker</h1>

        <section>

            <h2>キャラクター</h2>

            <div class="character-list">

                <button class="character-btn active"
                        data-image="assets/character/normal_sd_1.png">

                    <img src="assets/character/normal_sd_1.png">

                </button>

                <button class="character-btn"
                        data-image="assets/character/normal_sd_2.png">

                    <img src="assets/character/normal_sd_2.png">

                </button>

                <button class="character-btn"
                        data-image="assets/character/normal_sd_3.png">

                    <img src="assets/character/normal_sd_3.png">

                </button>

                <button class="character-btn"
                        data-image="assets/character/normal_sd_4.png">

                    <img src="assets/character/normal_sd_4.png">

                </button>

                <button class="character-btn"
                        data-image="assets/character/normal_sd_5.png">

                    <img src="assets/character/normal_sd_5.png">

                </button>

            </div>

        </section>

        <section>

            <h2>日付</h2>

            <input
                id="dateInput"
                type="month">

        </section>

        <section>

            <label>

                <input
                    id="firstCheck"
                    type="checkbox">

                初めて

            </label>

        </section>

        <section>

            <label>

                <input
                    id="continuousCheck"
                    type="checkbox">

                連続

            </label>

            <input
                id="continuousValue"
                type="number"
                value="12"
                min="1">

        </section>

        <section>

            <label>

                <input
                    id="countCheck"
                    type="checkbox">

                回数

            </label>

            <input
                id="countValue"
                type="number"
                value="12"
                min="1">

        </section>

        <button id="downloadBtn">

            PNG保存

        </button>

    </aside>

    <!--==========================
        プレビュー
    ==========================-->

    <main class="preview-area">

        <div id="preview">

            <img

                id="backgroundImage"

                class="background"

                src="assets/background/background_1.png"

                alt="background">

            <img

                id="characterImage"

                class="character"

                src="assets/character/normal_sd_1.png"

                alt="character">

            <img

                id="overlayImage"

                class="overlay"

                src="assets/overlay/overlay_1.png"

                alt="overlay">
                            <div
                id="dateText"
                class="date-text">

                2026.06

            </div>

            <div
                id="badgeText"
                class="badge-text">

                いつもありがとう！<br>
                これからもよろしくね！

            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
