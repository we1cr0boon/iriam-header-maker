<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像合成ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="selector-panel">
            <h2>キャラクター選択</h2>
            <div id="thumbnail-list"></div>
        </div>

        <div id="preview-panel">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
            
            <div class="controls">
    <h3>メッセージ選択</h3>
    <label><input type="checkbox" id="check1" class="msg-check"> 初めて</label>
    <label><input type="checkbox" id="check2" class="msg-check"> ○ヶ月連続</label>
    <label><input type="checkbox" id="check3" class="msg-check"> ○回目</label>
    
    <button id="downloadBtn">PNGとして保存</button>
</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
